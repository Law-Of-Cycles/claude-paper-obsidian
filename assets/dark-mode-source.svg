    <text x="87" y="92" fill="#e9e3d8" font-family="DejaVu Sans, sans-serif" font-size="11" font-weight="700" letter-spacing="1.1">CLAUDE PAPER</text>
    <text x="87" y="120" fill="#7d756d" font-family="DejaVu Sans, sans-serif" font-size="8" letter-spacing="1">VAULT</text>
    <rect x="79" y="132" width="128" height="25" rx="6" fill="#e59a73" fill-opacity=".14"/>
    <circle cx="91" cy="144.5" r="2.6" fill="#e59a73"/>
    <text x="101" y="148" fill="#e59a73" font-family="DejaVu Sans, sans-serif" font-size="9.5" font-weight="700">Welcome</text>
    <text x="101" y="178" fill="#b6aea4" font-family="DejaVu Sans, sans-serif" font-size="9.5">Ideas</text>
    <text x="101" y="203" fill="#b6aea4" font-family="DejaVu Sans, sans-serif" font-size="9.5">Reading notes</text>
    <text x="101" y="228" fill="#b6aea4" font-family="DejaVu Sans, sans-serif" font-size="9.5">Daily journal</text>
    <text x="101" y="253" fill="#b6aea4" font-family="DejaVu Sans, sans-serif" font-size="9.5">Archive</text>
    <text x="87" y="388" fill="#7d756d" font-family="DejaVu Sans, sans-serif" font-size="8">Law-Of-Cycles</text>

    <rect x="248" y="84" width="472" height="304" rx="10" fill="#24201c" stroke="#3b332d" filter="url(#paper-shadow)"/>
    <text x="284" y="127" fill="#e9e3d8" font-family="DejaVu Sans, sans-serif" font-size="25" font-weight="700" letter-spacing="-.6">Darkness with warmth intact</text>
    <line x1="284" y1="143" x2="683" y2="143" stroke="#3b332d"/>
    <rect x="284" y="165" width="3" height="27" rx="1.5" fill="#e59a73"/>
    <text x="299" y="185" fill="#e9e3d8" font-family="DejaVu Sans, sans-serif" font-size="17" font-weight="700">Designed as its own palette</text>

    <text x="284" y="218" fill="#b6aea4" font-family="DejaVu Serif, serif" font-size="11.5">Muted paper tones reduce glare without flattening hierarchy.</text>
    <text x="284" y="237" fill="#b6aea4" font-family="DejaVu Serif, serif" font-size="11.5">Clay accents remain calm, while</text>
    <text x="480" y="237" fill="#e59a73" font-family="DejaVu Serif, serif" font-size="11.5" font-style="italic">italics stay expressive.</text>

    <rect x="284" y="260" width="399" height="53" rx="7" fill="#171411" stroke="#3b332d"/>
    <text x="299" y="282" fill="#a884d3" font-family="DejaVu Sans Mono, monospace" font-size="10">const</text>
    <text x="336" y="282" fill="#699ddb" font-family="DejaVu Sans Mono, monospace" font-size="10">mode</text>
    <text x="369" y="282" fill="#b6aea4" font-family="DejaVu Sans Mono, monospace" font-size="10">=</text>
    <text x="384" y="282" fill="#5abe85" font-family="DejaVu Sans Mono, monospace" font-size="10">"dark, never generic"</text>
    <text x="299" y="300" fill="#7d756d" font-family="DejaVu Sans Mono, monospace" font-size="8.5">// matched spacing, syntax, and semantic color</text>

    <rect x="284" y="335" width="61" height="20" rx="10" fill="#e59a73" fill-opacity=".14" stroke="#e59a73" stroke-opacity=".35"/>
    <text x="314.5" y="348.5" text-anchor="middle" fill="#e59a73" font-family="DejaVu Sans, sans-serif" font-size="8.5" font-weight="700">#writing</text>
    <rect x="353" y="335" width="79" height="20" rx="10" fill="#e59a73" fill-opacity=".14" stroke="#e59a73" stroke-opacity=".35"/>
    <text x="392.5" y="348.5" text-anchor="middle" fill="#e59a73" font-family="DejaVu Sans, sans-serif" font-size="8.5" font-weight="700">#night-mode</text>
